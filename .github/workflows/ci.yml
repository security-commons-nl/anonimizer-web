name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Python-syntax- en install-check via herbruikbare workflow.
  # test-command doet een py_compile want er zijn (nog) geen pytest-tests.
  tests:
    uses: security-commons-nl/.github/.github/workflows/python-ci.yml@main
    with:
      python-version: "3.12"
      test-command: "python -m py_compile app.py"
      install-extras: ""

  docs:
    uses: security-commons-nl/.github/.github/workflows/doc-compliance.yml@main
    with:
      require-gebruik: false
      require-architectuur: false
      require-configuratie: false
