name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    uses: security-commons-nl/.github/.github/workflows/python-ci.yml@main
    with:
      python-version: "3.12"
      test-command: "pytest tests/ -v"
      install-extras: "pytest"

  docs:
    uses: security-commons-nl/.github/.github/workflows/doc-compliance.yml@main
    with:
      require-gebruik: false
      require-architectuur: false
      require-configuratie: false
